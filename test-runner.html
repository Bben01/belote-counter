<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Belote Logic Tests</title>
  <style>
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      margin: 0;
      padding: 16px;
      background: #0b0f14;
      color: #e6edf3;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: baseline;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .ok {
      color: #34d399;
    }

    .bad {
      color: #fb7185;
    }

    pre {
      white-space: pre-wrap;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>

<body>
  <div class="row">
    <div class="pill">Open DevTools console for details</div>
    <div class="pill" id="summary">Running…</div>
  </div>
  <pre id="log"></pre>

  <script type="module">
    import { Team, CoincheStatus, calculateScore, parseInput } from "./logic.js"

    const logEl = document.getElementById("log")
    const summaryEl = document.getElementById("summary")

    const lines = []
    const log = (s) => {
      lines.push(String(s))
      logEl.textContent = lines.join("\n")
    }

    let passed = 0
    let failed = 0

    const assert = (cond, msg) => {
      if (!cond) throw new Error(msg || "assertion failed")
    }

    const eq = (a, b, msg) => {
      if (a !== b) throw new Error((msg ? msg + " - " : "") + `expected ${JSON.stringify(b)} got ${JSON.stringify(a)}`)
    }

    const test = (name, fn) => {
      try {
        fn()
        console.log("[PASS]", name)
        log(`[PASS] ${name}`)
        passed++
      } catch (err) {
        console.error("[FAIL]", name, err)
        log(`[FAIL] ${name}\n  ${err && err.message ? err.message : String(err)}`)
        failed++
      }
    }

    test("rejects contract-only without points/chute", () => {
      const res = parseInput("Nous 120")
      assert(res && typeof res === "object", "expected object")
      assert("error" in res, "expected error")
    })

    test("contract-only with dedans is accepted (points=0)", () => {
      const r = parseInput("Nous 120 dedans", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.contract, 120)
      eq(r.pointsScored, 0)
      eq(r.isSuccess, false)
      eq(r.winner, Team.EUX)
      eq(r.deltaEux, 282) // 162 + 120
    })

    test("basic success scoring", () => {
      const r = parseInput("Nous 100 120", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.contract, 100)
      eq(r.isSuccess, true)
      eq(r.deltaNous, 220)
      eq(r.deltaEux, 42)
    })

    test("chute/dedans makes taker fail", () => {
      const r = parseInput("Nous 90 chute", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.isSuccess, false)
      eq(r.winner, Team.EUX)
      eq(r.deltaEux, 252)
      eq(r.deltaNous, 0)
    })

    test("coinche doubles contract points", () => {
      const r = parseInput("Nous 80 coinche 120", 0, 0)
      eq(r.isSuccess, true)
      eq(r.deltaNous, 280)
      eq(r.deltaEux, 42)
    })

    test("surcoinche quadruples contract points", () => {
      const r = parseInput("Eux 80 sur 120", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.isSuccess, true)
      eq(r.deltaEux, 440)
      eq(r.deltaNous, 42)
    })

    test("belote defaults to taker", () => {
      const r = parseInput("Eux 100 120 belote", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.isSuccess, true)
      eq(r.deltaEux, 240)
      eq(r.deltaNous, 42)
    })

    test("belote can be attributed to defense", () => {
      const r = parseInput("Eux 100 120 belote nous", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.isSuccess, true)
      eq(r.deltaEux, 220)
      eq(r.deltaNous, 62)
    })

    test("taker detection: first team keyword wins (Eux ... belote nous)", () => {
      const r = parseInput("Eux 100 120 belote nous", 0, 0)
      eq(r.taker, Team.EUX)
    })

    test("taker detection: first team keyword wins (Nous ... belote eux)", () => {
      const r = parseInput("Nous 100 120 belote eux", 0, 0)
      eq(r.taker, Team.NOUS)
    })

    test("example: Nous 100 65 => other number treated as defense points (<82), so taker likely fails", () => {
      const r = parseInput("Nous 100 65", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.contract, 100)
      eq(r.pointsScored, 97) // 162 - 65
      eq(r.isSuccess, false)
      eq(r.winner, Team.EUX)
      eq(r.deltaEux, 262) // 162 + 100
    })

    test("example: Eux 120 90 belote => belote defaults to taker; still can fail", () => {
      const r = parseInput("Eux 120 90 belote", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.contract, 120)
      eq(r.pointsScored, 90)
      eq(r.isSuccess, false) // 90 + 20 < 120
      eq(r.winner, Team.NOUS)
      eq(r.deltaNous, 302) // 162 + 120 + 20
    })

    test("capot via numeric contract (250) without points is accepted", () => {
      const r = parseInput("Nous 250", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.contract, 250)
      eq(r.isCapot, true)
      eq(r.isSuccess, true)
      eq(r.deltaNous, 500)
      eq(r.deltaEux, 0)
    })

    test("capot via 270 without points is accepted", () => {
      const r = parseInput("Eux 270", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.contract, 270)
      eq(r.isCapot, true)
      eq(r.isSuccess, true)
      eq(r.deltaEux, 520) // 250 + 270
      eq(r.deltaNous, 0)
    })

    test("coinche fail with chute: defense gets (162 + contract*2)", () => {
      const r = parseInput("Eux 80 coinche chute", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.contract, 80)
      eq(r.isSuccess, false)
      eq(r.winner, Team.NOUS)
      eq(r.deltaNous, 322) // 162 + 80*2
    })

    test("explicit preneur synonyms: on/ils/adv", () => {
      const a = parseInput("on 100 120", 0, 0)
      eq(a.taker, Team.NOUS)
      const b = parseInput("ils 100 120", 0, 0)
      eq(b.taker, Team.EUX)
      const c = parseInput("adv 100 120", 0, 0)
      eq(c.taker, Team.EUX)
    })

    test("belote owner parsing: 'nous belote' and 'belote eux'", () => {
      const a = parseInput("Nous 100 120 nous belote", 0, 0)
      eq(a.beloteOwner, Team.NOUS)
      const b = parseInput("Nous 100 120 belote eux", 0, 0)
      eq(b.beloteOwner, Team.EUX)
    })

    test("surcoinche beats coinche if both present", () => {
      const r = parseInput("Nous 80 cc sur 120", 0, 0)
      eq(r.coinche, CoincheStatus.SURCOINCHE)
      eq(r.deltaNous, 440) // 120 + 80*4
    })

    test("explicit defense points: Nous 100 Eux 40 => taker points = 162-40", () => {
      const r = parseInput("Nous 100 Eux 40", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.contract, 100)
      eq(r.pointsScored, 122)
    })

    test("explicit defense points: Eux 100 Nous 40 => taker points = 162-40", () => {
      const r = parseInput("Eux 100 Nous 40", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.contract, 100)
      eq(r.pointsScored, 122)
    })

    test("multiple numbers: contract + first non-contract number used", () => {
      const r = parseInput("Nous 100 120 10", 0, 0)
      eq(r.contract, 100)
      eq(r.pointsScored, 120)
      eq(r.isSuccess, true)
    })

    test("explicit points equal to contract are ignored, other side used", () => {
      const r = parseInput("Nous 100 nous 100 eux 62", 0, 0)
      eq(r.contract, 100)
      eq(r.pointsScored, 100) // 162 - 62
    })

    test("coinche/surcoinche abbreviations: cc/sc", () => {
      const a = parseInput("Nous 80 cc 120", 0, 0)
      eq(a.coinche, CoincheStatus.COINCHE)
      eq(a.deltaNous, 280)
      const b = parseInput("Eux 80 sc 120", 0, 0)
      eq(b.coinche, CoincheStatus.SURCOINCHE)
      eq(b.deltaEux, 440)
    })

    test("capot keyword implies contract 250", () => {
      const r = parseInput("Eux capot", 0, 0)
      eq(r.taker, Team.EUX)
      eq(r.contract, 250)
      eq(r.isCapot, true)
    })

    test("calculateScore: failure with belote on defense adds belote to defense", () => {
      const r = calculateScore({
        id: "x",
        rawInput: "",
        taker: Team.NOUS,
        contract: 100,
        isCapot: false,
        pointsScored: 80,
        beloteOwner: Team.EUX,
        coinche: CoincheStatus.NONE,
        totalNous: 0,
        totalEux: 0,
      })
      eq(r.isSuccess, false)
      eq(r.winner, Team.EUX)
      eq(r.deltaEux, 282) // 162 + 100 + 20
      eq(r.deltaNous, 0)
    })

    test("calculateScore: capot success requires >=162 pointsScored", () => {
      const a = calculateScore({
        id: "x",
        rawInput: "",
        taker: Team.NOUS,
        contract: 250,
        isCapot: true,
        pointsScored: 161,
        beloteOwner: null,
        coinche: CoincheStatus.NONE,
        totalNous: 0,
        totalEux: 0,
      })
      eq(a.isSuccess, false)
      const b = calculateScore({
        id: "x",
        rawInput: "",
        taker: Team.NOUS,
        contract: 250,
        isCapot: true,
        pointsScored: 162,
        beloteOwner: null,
        coinche: CoincheStatus.NONE,
        totalNous: 0,
        totalEux: 0,
      })
      eq(b.isSuccess, true)
    })

    test("invalid: no valid contract present", () => {
      const res = parseInput("Nous 75 65", 0, 0)
      assert("error" in res, "expected error")
    })

    test("capot scores as capot", () => {
      const r = parseInput("Nous capot", 0, 0)
      eq(r.taker, Team.NOUS)
      eq(r.isCapot, true)
      eq(r.isSuccess, true)
      eq(r.deltaNous, 500)
      eq(r.deltaEux, 0)
    })

    test("multiple point mentions shadow the contract successfully", () => {
      const r1 = parseInput("nous 80 nous 50", 0, 0)
      eq(r1.pointsScored, 50, "should accept second explicit point mention as taker score")
      eq(r1.isSuccess, false)

      const r2 = parseInput("100 nous on 120", 0, 0)
      eq(r2.pointsScored, 120, "should handle early explicit mentions ignoring the contract")
      eq(r2.isSuccess, true)
    })

    const summary = failed === 0 ? `OK (${passed} tests)` : `FAIL (${passed} passed, ${failed} failed)`
    summaryEl.textContent = summary
    summaryEl.className = "pill " + (failed === 0 ? "ok" : "bad")
  </script>
</body>

</html>
